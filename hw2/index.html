<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>HW#2 資工選課表</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background-color: #55a86d; color: white; text-align: left; padding: 12px; border: 1px solid #ddd; }
        td { padding: 12px; border: 1px solid #ddd; cursor: pointer; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        tr:hover { background-color: #e8f5e9; }

        #courseModal {
            display: none;
            position: fixed;
            top: 50px;
            right: 50px;
            width: 320px;
            background: white;
            border: 2px solid #55a86d;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
            z-index: 10000;
        }
        .pop-header { font-weight: bold; font-size: 18px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .red-text { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h1>資工選課表</h1>

    <table id="csie">
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課教師</th>
            </tr>
        </thead>
        <tbody>
            {% for course in courses %}
            <tr onclick="openCourseDetail('{{ course.CourseTitle }}', '{{ course.Instructor }}', '{{ course.Department }}')">
                <td>{{ course.Department }}</td>
                <td>{{ course.CourseTitle }}</td>
                <td>{{ course.Instructor }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <button onclick="changeResult()">Change</button>

    <div id="courseModal">
        <div class="pop-header">課程詳細資料 🖨️ </div>
        <div id="modalContent"></div>
        <hr>
        <button onclick="document.getElementById('courseModal').style.display='none'">關閉視窗</button>
    </div>
    
    <script>
        function changeResult() {
            var myTable = document.getElementById("csie");
            if (myTable.rows.length > 1) {
                myTable.rows[1].cells[2].innerHTML = "李春良";
            }
        }

        function openCourseDetail(title, instructor, dept) {
            var modal = document.getElementById("courseModal");
            var content = document.getElementById("modalContent");

            content.innerHTML = `
                <p><strong>學年/學期：</strong> 114/2</p>
                <p><strong>授課教師：</strong> ${instructor}</p>
                <p><strong>開課單位：</strong> ${dept}</p>
                <p><strong>課程名稱：</strong> ${title}</p>
                <p><strong>開課序號：</strong> <span class="red-text">A2337</span></p>
            `;

            modal.style.display = "block";
        }
    </script>

</body>
</html>
